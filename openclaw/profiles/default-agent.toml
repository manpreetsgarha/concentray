name = "concentray-default"
mode = "plugin_first"

[env]
TM_PROVIDER = "local_json"
TM_LOCAL_STORE = "__REPO_ROOT__/.data/store.json"
TM_SKILLS_ALLOWLIST = "__REPO_ROOT__/apps/cli/src/concentray_cli/skills/skills.yaml"
TM_UPDATED_BY = "AI"

[plugin]
id = "concentray"
path = "__REPO_ROOT__/openclaw/plugin"
manifest = "__REPO_ROOT__/openclaw/plugin/openclaw.plugin.json"

[policy]
allowlist = "__OPENCLAW_ALLOWLIST__"

[fallback]
enabled = true
fallback_skill = "__REPO_ROOT__/openclaw/SKILL.md"
